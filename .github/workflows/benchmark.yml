name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.1

      - name: Enable Corepack
        run: corepack enable

      - name: Install root dependencies
        run: pnpm install

      - name: Install Chrome for Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Run benchmark matrix
        run: pnpm benchmark:versions

      - name: Generate report
        run: pnpm report

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rspack-react-10k-benchmark-report
          path: artifacts/**

      - name: Append job summary
        run: cat artifacts/report.md >> "$GITHUB_STEP_SUMMARY"
